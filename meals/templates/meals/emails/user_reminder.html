<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Missionary Meal Reminder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        @media screen and (max-width: 600px) {
            .main-table {
                width: 100% !important;
            }
            .content-padding {
                padding: 20px 15px 20px 15px !important;
            }
            .header-text {
                font-size: 24px !important;
            }
        }
    </style>
</head>
<body style="margin: 0; padding: 0;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
        <tr>
            <td style="padding: 20px 0 30px 0;">
                <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" class="main-table" style="border: 1px solid #cccccc; border-collapse: collapse; background-color: #ffffff; max-width: 600px;">
                    <tr>
                        <td align="center" bgcolor="#4CAF50" class="header-text" style="padding: 40px 0 30px 0; color: #ffffff; font-size: 28px; font-weight: bold;">
                            Missionary Meal Reminder
                        </td>
                    </tr>
                    <tr>
                        <td class="content-padding" style="padding: 40px 30px 40px 30px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td style="color: #153643; font-size: 18px; line-height: 24px;">
                                        Hi {{ name }},
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 20px 0 10px 0; color: #153643; font-size: 16px; line-height: 20px;">
                                        This is a friendly reminder that you are signed up to feed the missionaries tomorrow:
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding: 20px 0 30px 0; color: #4CAF50; font-size: 24px; font-weight: bold;">
                                        {{ date|date:"l, F j" }}
                                    </td>
                                </tr>
                                <tr>
                                    <td style="color: #153643; font-size: 16px; line-height: 20px;">
                                        Thank you so much for your service!
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td bgcolor="#eeeeee" style="padding: 30px 30px 30px 30px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center" style="color: #777777; font-size: 12px;">
                                        Missionary Meal Calendar - {{ ward_name|default:"Farmington Ward" }}
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
