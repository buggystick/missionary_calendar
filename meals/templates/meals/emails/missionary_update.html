<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Missionary Meal Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body style="margin: 0; padding: 0;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
        <tr>
            <td style="padding: 20px 0 30px 0;">
                <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" style="border: 1px solid #cccccc; border-collapse: collapse; background-color: #ffffff;">
                    <tr>
                        <td align="center" bgcolor="{% if cancelled %}#f44336{% else %}#2196F3{% endif %}" style="padding: 40px 0 30px 0; color: #ffffff; font-size: 28px; font-weight: bold;">
                            Missionary Meal Update
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 40px 30px 40px 30px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td style="color: #153643; font-size: 16px; line-height: 24px;">
                                        An appointment for <strong>{{ date|date:"l, F j" }}</strong> has been updated:
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding: 20px 0 0 0;">
                                        <table border="0" cellpadding="15" cellspacing="0" width="100%" bgcolor="#f9f9f9" style="border: 1px solid #eeeeee; border-radius: 4px;">
                                            <tr>
                                                <td style="color: #333333; font-size: 16px; line-height: 20px;">
                                                    {% if cancelled %}
                                                        <span style="color: #d32f2f; font-weight: bold;">The appointment has been CANCELLED.</span>
                                                    {% else %}
                                                        <strong>Status:</strong> {{ status }}<br/><br/>
                                                        {% if name %}
                                                            <strong>Name:</strong> {{ name }}<br/>
                                                            <strong>Phone:</strong> {{ phone }}<br/>
                                                        {% endif %}
                                                    {% endif %}
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" style="padding: 30px 0 0 0;">
                                        <a href="{{ calendar_url }}" style="background-color: #2196F3; color: #ffffff; padding: 12px 25px; text-decoration: none; border-radius: 4px; font-weight: bold;">View Calendar</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td bgcolor="#eeeeee" style="padding: 30px 30px 30px 30px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center" style="color: #777777; font-size: 12px;">
                                        Missionary Meal Calendar
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
