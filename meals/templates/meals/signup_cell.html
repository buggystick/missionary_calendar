{% load meal_tags %}
<div class="date-num">{% if signup %}{{ signup.date.day }}{% else %}{{ date.day }}{% endif %}</div>
{% if signup %}
    {% if signup.is_unavailable %}
        <span class="status-text">Unavailable</span>
    {% else %}
        <span class="name">{{ signup.name }}</span>
        <span class="phone">{{ signup.phone|format_phone }}</span>
    {% endif %}
{% endif %}
<script>
    var cell = document.getElementById('cell-{% if signup %}{{ signup.date|date:"Y-m-d" }}{% else %}{{ date|date:"Y-m-d" }}{% endif %}');
    cell.classList.remove('signed-up', 'unavailable');
    {% if signup %}
        cell.classList.add('{% if signup.is_unavailable %}unavailable{% elif signup.name %}signed-up{% endif %}');
    {% endif %}
</script>
