<h2>Sign up for {{ date|date:"F j, Y" }}</h2>
<form id="signup-form" hx-post="{% url 'meal_signup_submit' %}?date={{ date|date:'Y-m-d' }}" hx-target="#cell-{{ date|date:'Y-m-d' }}" hx-swap="innerHTML">
    {% csrf_token %}
    <input type="hidden" name="is_unavailable" id="id_is_unavailable" value="{% if signup.is_unavailable %}on{% endif %}">
    
    <div id="signup-fields" {% if signup.is_unavailable %}style="display:none"{% endif %}>
        <div id="error-message" style="color: #f44336; margin-bottom: 1em; display: none; font-weight: bold;"></div>
        <div class="form-group">
            <label for="id_name">Name:</label>
            <input type="text" name="name" id="id_name" value="{{ signup.name|default:'' }}">
        </div>
        <div class="form-group">
            <label for="id_phone">Phone:</label>
            <input type="text" name="phone" id="id_phone" value="{{ signup.phone|default:'' }}" placeholder="(555) 555-5555">
        </div>
        <div class="form-group">
            <label for="id_email">Email (optional for reminders):</label>
            <input type="email" name="email" id="id_email" value="{{ signup.email|default:'' }}">
        </div>
    </div>

    {% if signup.is_unavailable %}
    <div id="unavailable-message" style="color: #721c24; margin-bottom: 1em;">
        This date is currently marked as unavailable.
    </div>
    {% endif %}

    <div class="modal-buttons">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="button" class="btn-save" id="btn-make-available" style="{% if not signup.is_unavailable %}display:none{% endif %}" onclick="markAvailable()">Make Available</button>
        <button type="submit" class="btn-save" id="btn-save" style="{% if signup.is_unavailable %}display:none{% endif %}">Save</button>
        
        {% if signup and not signup.is_unavailable %}
            <button type="button" style="background: #f44336; color: white; border: none; border-radius: 4px; margin-right: 0.5em; padding: 0.5em 1em; cursor: pointer;" onclick="deleteAppointment()">Delete Appointment</button>
        {% elif not signup %}
            <button type="button" style="background: #607D8B; color: white; border: none; border-radius: 4px; margin-right: 0.5em; padding: 0.5em 1em; cursor: pointer;" onclick="markUnavailable()">Unavailable</button>
        {% endif %}
    </div>
</form>

<script>
function deleteAppointment() {
    if (confirm('Are you sure you want to cancel this appointment?')) {
        document.getElementById('id_name').value = '';
        document.getElementById('id_phone').value = '';
        document.getElementById('id_email').value = '';
        document.getElementById('id_is_unavailable').value = 'delete';
        document.getElementById('signup-form').requestSubmit();
    }
}
function markUnavailable() {
    document.getElementById('id_is_unavailable').value = 'on';
    document.getElementById('signup-form').requestSubmit();
}

function markAvailable() {
    document.getElementById('id_is_unavailable').value = '';
    document.getElementById('signup-fields').style.display = 'block';
    if (document.getElementById('unavailable-message')) {
        document.getElementById('unavailable-message').style.display = 'none';
    }
    if (document.getElementById('btn-make-available')) {
        document.getElementById('btn-make-available').style.display = 'none';
    }
    if (document.getElementById('btn-save')) {
        document.getElementById('btn-save').style.display = 'inline-block';
    }
}

function validateForm(event) {
    const isUnavailable = document.getElementById('id_is_unavailable').value === 'on';
    const name = document.getElementById('id_name').value;
    const phone = document.getElementById('id_phone').value;
    const errorDiv = document.getElementById('error-message');

    // If it's NOT unavailable and there is some input, then both must be present
    // If both are empty, we allow it (it will clear the signup)
    if (!isUnavailable && (name || phone)) {
        if (!name || !phone) {
            errorDiv.textContent = 'Please enter both name and phone number.';
            errorDiv.style.display = 'block';
            if (event) event.preventDefault();
            return false;
        }
        
        // Basic phone number validation (at least 10 digits)
        const digits = phone.replace(/\D/g, '');
        if (digits.length < 10) {
            errorDiv.textContent = 'Please enter a valid 10-digit phone number.';
            errorDiv.style.display = 'block';
            if (event) event.preventDefault();
            return false;
        }
    }
    errorDiv.style.display = 'none';
    return true;
}

document.getElementById('id_phone').addEventListener('input', function (e) {
    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
    if (!x[2]) {
        e.target.value = x[1];
    } else {
        e.target.value = '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    }
});

document.getElementById('signup-form').addEventListener('submit', function(e) {
    if (!validateForm(e)) {
        e.preventDefault();
        e.stopImmediatePropagation();
    } else {
        closeModal();
    }
});
</script>
