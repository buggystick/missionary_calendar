<h2>Sign up for {{ date|date:"F j, Y" }}</h2>
<form id="signup-form" hx-post="{% url 'meal_signup_submit' %}?date={{ date|date:'Y-m-d' }}" hx-target="#cell-{{ date|date:'Y-m-d' }}" hx-swap="innerHTML" onsubmit="closeModal()">
    {% csrf_token %}
    <input type="hidden" name="is_unavailable" id="id_is_unavailable" value="{% if signup.is_unavailable %}on{% endif %}">
    
    <div id="signup-fields" {% if signup.is_unavailable %}style="display:none"{% endif %}>
        <div class="form-group">
            <label for="id_name">Name:</label>
            <input type="text" name="name" id="id_name" value="{{ signup.name|default:'' }}">
        </div>
        <div class="form-group">
            <label for="id_phone">Phone:</label>
            <input type="text" name="phone" id="id_phone" value="{{ signup.phone|default:'' }}">
        </div>
    </div>

    {% if signup.is_unavailable %}
    <div id="unavailable-message" style="color: #721c24; margin-bottom: 1em;">
        This date is currently marked as unavailable.
    </div>
    {% endif %}

    <div class="modal-buttons">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        {% if signup.is_unavailable %}
            <button type="button" class="btn-save" onclick="markAvailable()">Make Available</button>
        {% else %}
            <button type="button" style="background: #f44336; color: white; border: none; border-radius: 4px; margin-right: 0.5em; padding: 0.5em 1em; cursor: pointer;" onclick="markUnavailable()">Unavailable</button>
            <button type="submit" class="btn-save">Save</button>
        {% endif %}
    </div>
</form>

<script>
function markUnavailable() {
    document.getElementById('id_is_unavailable').value = 'on';
    document.getElementById('signup-form').requestSubmit();
}

function markAvailable() {
    document.getElementById('id_is_unavailable').value = '';
    // Show fields so user can fill them if they want, or just submit to clear it
    document.getElementById('signup-fields').style.display = 'block';
    document.getElementById('unavailable-message').style.display = 'none';
    
    // Change buttons back to Save/Cancel
    const buttonsDiv = document.querySelector('.modal-buttons');
    buttonsDiv.innerHTML = `
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="button" style="background: #f44336; color: white; border: none; border-radius: 4px; margin-right: 0.5em; padding: 0.5em 1em; cursor: pointer;" onclick="markUnavailable()">Unavailable</button>
        <button type="submit" class="btn-save">Save</button>
    `;
}

function validateForm() {
    const isUnavailable = document.getElementById('id_is_unavailable').value === 'on';
    if (!isUnavailable) {
        const name = document.getElementById('id_name').value;
        const phone = document.getElementById('id_phone').value;
        if (!name || !phone) {
            alert('Please enter both name and phone number.');
            return false;
        }
    }
    return true;
}

document.getElementById('signup-form').addEventListener('submit', function(e) {
    if (!validateForm()) {
        e.preventDefault();
        e.stopImmediatePropagation();
    }
});
</script>
