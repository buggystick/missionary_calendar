# GitLab CI/CD Configuration

stages:
  - test
  - deploy

# Cache node_modules for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# Run unit tests
unit_tests:
  stage: test
  image: node:latest
  before_script:
    - npm ci
  script:
    - npm run test:unit
  only:
    - merge_requests
    - main

# Run functional tests
functional_tests:
  stage: test
  image: mcr.microsoft.com/playwright:latest
  before_script:
    - npm ci
  script:
    - npx playwright install --with-deps
    - npm run test:functional
  only:
    - merge_requests
    - main

# Deploy to Heroku staging for all branches except main
deploy_staging:
  stage: deploy
  image: node:16
  script:
    - npm install -g heroku
    - echo "machine api.heroku.com login _ password $HEROKU_API_KEY" > ~/.netrc
    - echo "machine git.heroku.com login _ password $HEROKU_API_KEY" >> ~/.netrc
    - chmod 600 ~/.netrc
    - heroku container:login
    - heroku container:push web --app $HEROKU_APP_STAGING
    - heroku container:release web --app $HEROKU_APP_STAGING
  only:
    - branches
  except:
    - main
  environment:
    name: staging
    url: https://$HEROKU_APP_STAGING.herokuapp.com

# Deploy to Heroku production for main branch
deploy_production:
  stage: deploy
  image: node:16
  script:
    - npm install -g heroku
    - echo "machine api.heroku.com login _ password $HEROKU_API_KEY" > ~/.netrc
    - echo "machine git.heroku.com login _ password $HEROKU_API_KEY" >> ~/.netrc
    - chmod 600 ~/.netrc
    - heroku container:login
    - heroku container:push web --app $HEROKU_APP_PRODUCTION
    - heroku container:release web --app $HEROKU_APP_PRODUCTION
  only:
    - main
  environment:
    name: production
    url: https://$HEROKU_APP_PRODUCTION.herokuapp.com
  when: manual # Requires manual approval for production deployment
