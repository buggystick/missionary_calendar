# GitLab CI/CD Configuration

stages:
  - test
  - deploy
  - functional_test

# Cache node_modules for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# Run unit tests as a quick sanity check
unit_tests:
  stage: test
  image: node:latest
  before_script:
    - npm ci
  script:
    - npm run test:unit
  only:
    - merge_requests
    - main

# Deploy to Heroku staging when unit tests pass
deploy_staging:
  stage: deploy
  image: node:latest
  needs: ["unit_tests"]
  variables:
    GIT_DEPTH: 0  # Perform a full clone instead of a shallow clone
  script:
    - curl https://cli-assets.heroku.com/install-ubuntu.sh | sh && rm -rf /var/lib/apt/lists/*
    - curl https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 -o /usr/local/bin/jq && chmod +x /usr/local/bin/jq
    - echo "machine api.heroku.com login _ password $HEROKU_API_KEY" > ~/.netrc
    - echo "machine git.heroku.com login _ password $HEROKU_API_KEY" >> ~/.netrc
    - chmod 600 ~/.netrc
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    - heroku git:remote --app $HEROKU_APP_STAGING
    - git push heroku HEAD:refs/heads/main
    - |
      curl -s -n \
        -H "Accept: application/vnd.heroku+json; version=3" \
        -H "Authorization: Bearer $HEROKU_API_KEY" \
        https://api.heroku.com/apps/$HEROKU_APP_STAGING \
        | jq -r '.web_url'
#    - export STAGING_URL=$(heroku apps:info --json -a $HEROKU_APP_STAGING | jq -r '.app.web_url')
    - echo "STAGING_URL=$STAGING_URL"
    - echo $STAGING_URL >> deploy.env
  only:
    - main
  environment:
    name: staging
  artifacts:
    reports:
      dotenv: deploy.env

# Run functional tests against the live code in Heroku
functional_tests:
  stage: functional_test
  image: mcr.microsoft.com/playwright:v1.52.0-noble
  needs: ["deploy_staging"]
  variables:
    GIT_DEPTH: 0  # full clone
  before_script:
    - npm ci
  script:
    - export PLAYWRIGHT_HTML_REPORT="playwright-report-staging"
    - mkdir -p playwright-report-staging
    - echo "Running playwright test at $STAGING_URL"
    - npx playwright test --config=./playwright.staging.config.js
  only:
    - main
  artifacts:
    when: always
    paths:
      - playwright-report-staging/
