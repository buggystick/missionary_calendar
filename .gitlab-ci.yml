# GitLab CI/CD Configuration

stages:
  - test
  - deploy
  - functional_test

# Cache node_modules for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# Run unit tests as a quick sanity check
unit_tests:
  stage: test
  image: node:latest
  before_script:
    - npm ci
  script:
    - npm run test:unit
  only:
    - merge_requests
    - main

# Deploy to Heroku staging when unit tests pass
deploy_staging:
  stage: deploy
  image: node:latest
  needs: ["unit_tests"]
  variables:
    GIT_DEPTH: 0  # Perform a full clone instead of a shallow clone
  script:
    - curl https://cli-assets.heroku.com/install-ubuntu.sh | sh && rm -rf /var/lib/apt/lists/*
    - echo "machine api.heroku.com login _ password $HEROKU_API_KEY" > ~/.netrc
    - echo "machine git.heroku.com login _ password $HEROKU_API_KEY" >> ~/.netrc
    - chmod 600 ~/.netrc
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    - heroku git:remote --app $HEROKU_APP_STAGING
    - git push heroku HEAD:refs/heads/main
  only:
    - main
  environment:
    name: staging
    url: https://$HEROKU_APP_STAGING.herokuapp.com

# Run functional tests against the live code in Heroku
functional_tests:
  stage: functional_test
  image: mcr.microsoft.com/playwright:latest
  needs: ["deploy_staging"]
  variables:
    GIT_DEPTH: 0  # Perform a full clone instead of a shallow clone
  before_script:
    - npm ci
  script:
    - npx playwright install --with-deps
    # Debug: List files to verify playwright.staging.config.js exists
    - ls -la
    # Make sure the config file is readable
    - if [ -f "./playwright.staging.config.js" ]; then chmod +r ./playwright.staging.config.js; else echo "Config file not found, creating it"; cat > ./playwright.staging.config.js << 'EOL'
import { defineConfig } from '@playwright/test';

export default defineConfig({
    testDir: './tests/functional',
    timeout: 30000,
    retries: 1,
    use: {
        baseURL: process.env.STAGING_URL || 'https://your-staging-app.herokuapp.com',
        headless: true,
    },
    webServer: {
        reuseExistingServer: true,
    },
});
EOL
fi
    # Run tests against the deployed Heroku app using the staging config
    - STAGING_URL=https://$HEROKU_APP_STAGING.herokuapp.com PLAYWRIGHT_HTML_REPORT=playwright-report-staging npx playwright test --config=./playwright.staging.config.js
  only:
    - main
  artifacts:
    when: always
    paths:
      - playwright-report-staging/
