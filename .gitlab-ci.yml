# GitLab CI/CD Configuration

stages:
  - test
  - deploy

# Cache node_modules for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# Run unit tests
unit_tests:
  stage: test
  image: node:latest
  before_script:
    - npm ci
  script:
    - npm run test:unit
  only:
    - merge_requests
    - main

# Run functional tests
functional_tests:
  stage: test
  image: mcr.microsoft.com/playwright:latest
  before_script:
    - npm ci
  script:
    - npx playwright install --with-deps
    - npm run test:functional
  only:
    - merge_requests
    - main

# Deploy to Heroku staging for all branches except main
deploy_staging:
  stage: deploy
  image: node:20
  script:
    - npm install -g heroku
    - echo "machine api.heroku.com login _ password $HEROKU_API_KEY" > ~/.netrc
    - echo "machine git.heroku.com login _ password $HEROKU_API_KEY" >> ~/.netrc
    - chmod 600 ~/.netrc
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    - heroku git:remote --app $HEROKU_APP_STAGING
    - git push https://heroku:$HEROKU_API_KEY@git.heroku.com/$HEROKU_APP_STAGING.git HEAD:refs/heads/main
  only:
    - main
  environment:
    name: staging
    url: https://$HEROKU_APP_STAGING.herokuapp.com

