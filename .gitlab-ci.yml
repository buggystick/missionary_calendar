# GitLab CI/CD Configuration

stages:
  - test
  - deploy

# Cache node_modules for faster builds
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# Run unit tests
unit_tests:
  stage: test
  image: node:latest
  before_script:
    - npm ci
  script:
    - npm run test:unit
  only:
    - merge_requests
    - main

# Run functional tests
functional_tests:
  stage: test
  image: mcr.microsoft.com/playwright:latest
  before_script:
    - npm ci
  script:
    - npx playwright install --with-deps
    - npm run test:functional
  only:
    - merge_requests
    - main

# Deploy to Heroku staging for all branches except main
deploy_staging:
  stage: deploy
  image: node:latest
  variables:
    GIT_DEPTH: 0  # Perform a full clone instead of a shallow clone
  script:
    - curl https://cli-assets.heroku.com/install-ubuntu.sh | sh && rm -rf /var/lib/apt/lists/*
    - echo "machine api.heroku.com login _ password $HEROKU_API_KEY" > ~/.netrc
    - echo "machine git.heroku.com login _ password $HEROKU_API_KEY" >> ~/.netrc
    - chmod 600 ~/.netrc
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    - heroku git:remote --app $HEROKU_APP_STAGING
    - git push heroku HEAD:refs/heads/main
  only:
    - main
  environment:
    name: staging
    url: https://$HEROKU_APP_STAGING.herokuapp.com

# Run functional tests against staging environment
staging_functional_tests:
  stage: deploy
  image: mcr.microsoft.com/playwright:latest
  needs: ["deploy_staging"]
  before_script:
    - npm ci
  script:
    - npx playwright install --with-deps
    - echo "export default { baseURL: 'https://$HEROKU_APP_STAGING.herokuapp.com', webServer: { reuseExistingServer: true } };" > playwright.staging.config.js
    # The tests will use the PostgreSQL database that's already configured on Heroku
    - PLAYWRIGHT_HTML_REPORT=playwright-report-staging npx playwright test --config=playwright.staging.config.js
  only:
    - main
  artifacts:
    when: always
    paths:
      - playwright-report-staging/
