<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Missionary Meal Calendar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            padding: 1em;
        }

        /* Example Banner (previously “unused”) */
        .information-banner {
            background: #fffbcc;
            border: 1px solid #e2dfb2;
            padding: 1em;
            margin-bottom: 1em;
            text-align: center;
            font-weight: bold;
        }

        h1 {
            text-align: center;
            margin: 0.5em 0;
        }

        .qr-code {
            text-align: center;
            margin: 1em 0;
        }

        .qr-code img {
            width: 120px;
            height: auto;
        }

        .month-nav {
            text-align: center;
            margin: 1em 0;
        }

        .month-nav button {
            padding: 0.5em 1em;
            margin: 0 1em;
            cursor: pointer;
            border: none;
            background: #4CAF50;
            color: #fff;
            border-radius: 4px;
            font-size: 1rem;
        }
        .month-nav button.secondary {
            background: #999;
            color: #fff;
        }

        /* Make the calendar container and month responsive */
        .calendar-container {
            display: flex;
            justify-content: center;
            margin: 0 auto;
            max-width: 900px;
            width: 100%;
        }

        .month {
            width: 100%;
            max-width: 800px; /* On large screens, don’t exceed 600px wide */
            border: 1px solid #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .month-title {
            background: #eee;
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            font-size: 1.2em;
        }

        /*
          1) table-layout: fixed  => uniform column widths
          2) width: 100%         => fill container
        */
        table {
            table-layout: fixed;
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        /*
          1) A fixed height (e.g. 100px).
          2) overflow: hidden or auto if we want scrollbars.
             We'll demonstrate overflow: hidden on the cell,
             but give an inner <div> a scroll if needed.
        */
        th, td {
            border: 1px solid #ccc;
            vertical-align: top;
            width: calc(100% / 7); /* Enforce equal column widths */
            height: 100px;         /* Fixed row height */
            position: relative;    /* We'll position an inner container */
            padding: 0;            /* Remove default padding in TD to handle scrolling better */
            overflow: hidden;      /* Hide overflow so rows remain uniform in height */
        }

        th {
            background: #f9f9f9;
            padding: 8px;
        }

        /* We'll place contents in an inner container so we can scroll that if needed */
        .day-content {
            padding: 8px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow-y: clip;
        }

        /* Hover effect on future days */
        td:hover:not(.past-day) .day-content {
            background: #f0f8ff;
            cursor: pointer;
        }

        .past-day .day-content {
            background: #eee;
            color: #999;
            cursor: not-allowed !important;
        }

        .highlight-day .day-content {
            background-color: #ffc; /* Sundays highlighted */
        }

        /* Name & phone info clearly visible */
        .sign-up-info {
            display: block;
            font-size: 0.95em;
            color: #333;
            margin-top: 4px;
            word-wrap: break-word;
            overflow-wrap: anywhere;
        }

        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: #fff;
            padding: 20px;
            border-radius: 4px;
            max-width: 400px;
            width: 80%;
        }

        .modal-content {
            background: #fafafa;
            padding: 1em;
            border-radius: 4px;
        }

        .modal h3 {
            margin-top: 0;
        }

        .modal label {
            display: block;
            margin: 10px 0 5px;
        }

        .modal input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .modal-buttons {
            text-align: right;
        }

        .modal-buttons button {
            margin-left: 10px;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .close-btn {
            background-color: #ccc;
        }
        .save-btn {
            background-color: #4CAF50;
            color: #fff;
        }
        .delete-btn {
            background-color: #f44336;
            color: #fff;
        }

        /* Responsive tweak for small screens */
        @media (max-width: 600px) {
            th {
                padding: 6px;
            }
            .month-title {
                font-size: 1.1em;
            }
            th, td {
                height: 80px; /* smaller row height on mobile if desired */
            }
        }
    </style>
</head>
<body>

<h1>Farmington Ward Missionary Meal Calendar</h1>
<p style="text-align:center;">
    Scan the QR code or visit <strong>https://missionaries.farmingtonward.church</strong> to sign up!
</p>

<div class="qr-code">
    <img
            src="qr_code.png"
            alt="Scan to Sign Up"
    />
</div>

<div class="month-nav">
    <!-- Default show the current month; toggle to next month with this button -->
    <button id="nextMonthBtn">Next Month »</button>
</div>

<div class="calendar-container" id="calendarContainer"></div>

<!-- Modal for sign-up form -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-content">
            <h3 id="modalDateTitle">
                Sign Up for <span id="modalDate"></span>
            </h3>
            <label for="nameInput">Your Name</label>
            <input type="text" id="nameInput" placeholder="Enter your name"/>

            <label for="phoneInput">Phone Number</label>
            <input type="text" id="phoneInput" placeholder="(555) 555-5555"/>

            <div class="modal-buttons">
                <button class="delete-btn" id="deleteBtn">Clear</button>
                <button class="close-btn" id="closeBtn">Cancel</button>
                <button class="save-btn" id="saveBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    // signups = { "YYYY-M-D": { name, phone }, ... }
    let signups = {};
    let displayedYear, displayedMonth;

    window.addEventListener('DOMContentLoaded', () => {
        const today = new Date();
        displayedYear = today.getFullYear();
        displayedMonth = today.getMonth();

        fetchSignups().then(() => {
            refreshCalendar();
        });

        // NEXT MONTH button toggles current vs. next month
        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            const currentDate = new Date();
            const currentMonthIndex = currentDate.getMonth();
            const currentYearIndex = currentDate.getFullYear();

            if (displayedYear === currentYearIndex && displayedMonth === currentMonthIndex) {
                // Go to next
                displayedMonth++;
                if (displayedMonth > 11) {
                    displayedMonth = 0;
                    displayedYear++;
                }
                document.getElementById('nextMonthBtn').textContent = '« Current Month';
            } else {
                // Back to current
                displayedYear = currentYearIndex;
                displayedMonth = currentMonthIndex;
                document.getElementById('nextMonthBtn').textContent = 'Next Month »';
            }
            refreshCalendar();
        });

        // WEBSOCKET LOGIC
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        const socket = new WebSocket(wsUrl);

        socket.addEventListener('open', () => {
            console.log('WebSocket connected');
        });
        socket.addEventListener('close', () => {
            console.log('WebSocket disconnected');
        });
        socket.addEventListener('message', (evt) => {
            try {
                const data = JSON.parse(evt.data);
                if (data.event === 'signup-changed') {
                    console.log('Received signup-changed event:', data);
                    // Easiest approach: re-fetch everything to ensure we have the latest signups
                    fetchSignups().then(() => {
                        refreshCalendar();
                    });
                }
            } catch (err) {
                console.error('WebSocket message parse error:', err);
            }
        });
    });

    // Fetch signups from our /api/signups
    function fetchSignups() {
        return fetch('/api/signups')
            .then(res => res.json())
            .then(data => { signups = data; })
            .catch(err => console.error(err));
    }

    // Rebuild the calendar for displayedYear/displayedMonth
    function refreshCalendar() {
        const container = document.getElementById('calendarContainer');
        container.innerHTML = '';
        const monthDiv = buildCalendar(displayedYear, displayedMonth);
        container.appendChild(monthDiv);
    }

    function buildCalendar(year, month) {
        const monthName = new Date(year, month, 1).toLocaleString('default', { month: 'long' });
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDay = new Date(year, month, 1).getDay();

        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
            const th = document.createElement('th');
            th.textContent = day;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        let row = document.createElement('tr');
        let currentDay = 1;

        // Fill empty cells before first day
        for (let i = 0; i < firstDay; i++) {
            row.appendChild(document.createElement('td'));
        }

        const today = new Date();
        today.setHours(0,0,0,0);

        for (; currentDay <= daysInMonth; currentDay++) {
            if (row.children.length === 7) {
                tbody.appendChild(row);
                row = document.createElement('tr');
            }

            const dayCell = document.createElement('td');
            const dateKey = `${year}-${month+1}-${currentDay}`;
            const dayContent = document.createElement('div');
            dayContent.classList.add('day-content');
            dayContent.textContent = currentDay;

            const cellDate = new Date(year, month, currentDay);
            cellDate.setHours(0,0,0,0);

            if (cellDate < today) {
                // Past day
                dayCell.classList.add('past-day');
            } else {
                // Future/current day
                dayContent.setAttribute('data-date', dateKey);
                dayContent.addEventListener('click', handleCellClick);
            }

            // If there's existing signup data, display it
            if (signups[dateKey]) {
                const infoSpan = document.createElement('span');
                infoSpan.classList.add('sign-up-info');
                infoSpan.textContent = `${signups[dateKey].name} (${signups[dateKey].phone})`;
                dayContent.appendChild(document.createElement('br'));
                dayContent.appendChild(infoSpan);
            }

            dayCell.appendChild(dayContent);
            row.appendChild(dayCell);
        }

        // Fill leftover cells in last row
        while (row.children.length < 7) {
            row.appendChild(document.createElement('td'));
        }
        tbody.appendChild(row);
        table.appendChild(tbody);

        const monthDiv = document.createElement('div');
        monthDiv.classList.add('month');

        const monthTitle = document.createElement('div');
        monthTitle.classList.add('month-title');
        monthTitle.textContent = `${monthName} ${year}`;
        monthDiv.appendChild(monthTitle);
        monthDiv.appendChild(table);
        return monthDiv;
    }

    // Modal handling
    let selectedDateKey = null;
    function handleCellClick(e) {
        selectedDateKey = e.currentTarget.getAttribute('data-date');
        if (!selectedDateKey) return;

        document.getElementById('modalDate').textContent = selectedDateKey;

        const existing = signups[selectedDateKey];
        document.getElementById('nameInput').value = existing ? existing.name : '';
        document.getElementById('phoneInput').value = existing ? existing.phone : '';

        document.getElementById('modalOverlay').style.display = 'flex';
    }

    document.getElementById('closeBtn').addEventListener('click', () => {
        document.getElementById('modalOverlay').style.display = 'none';
    });

    document.getElementById('saveBtn').addEventListener('click', saveSignup);
    document.getElementById('deleteBtn').addEventListener('click', clearSignup);

    function saveSignup() {
        if (!selectedDateKey) return;
        const nameValue = document.getElementById('nameInput').value.trim();
        const phoneValue = document.getElementById('phoneInput').value.trim();

        fetch('/api/signups', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dateKey: selectedDateKey, name: nameValue, phone: phoneValue })
        })
            .then(res => res.json())
            .then(() => {
                document.getElementById('modalOverlay').style.display = 'none';
                // We don't manually refresh here because the 'signup-changed' event
                // from the WebSocket will cause ALL clients to refresh automatically
            })
            .catch(err => console.error(err));
    }

    function clearSignup() {
        if (!selectedDateKey) return;
        if (!confirm(`Clear sign-up info for ${selectedDateKey}?`)) return;

        fetch('/api/signups', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dateKey: selectedDateKey, name: '', phone: '' })
        })
            .then(res => res.json())
            .then(() => {
                document.getElementById('modalOverlay').style.display = 'none';
                // Again, let the WebSocket event handle reloading for everyone
            })
            .catch(err => console.error(err));
    }
</script>
</body>
</html>
