<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Missionary Meal Calendar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            padding: 1em;
        }
        h1, h2 {
            text-align: center;
        }
        .qr-code {
            text-align: center;
            margin: 1em 0;
        }
        .calendar-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 2em;
            margin: 0 auto;
            max-width: 1200px;
        }
        .month {
            width: 360px;
            border: 1px solid #333;
            border-radius: 5px;
            overflow: hidden;
        }
        .month-title {
            background: #eee;
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            cursor: pointer;
            vertical-align: top;
            height: 60px;
            position: relative;
        }
        th {
            background: #f9f9f9;
        }
        td:hover {
            background: #f0f8ff;
        }
        .sign-up-info {
            font-size: 0.9em;
            color: #333;
            margin-top: 4px;
            display: block;
        }
        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        /* Modal box */
        .modal {
            background: #fff;
            padding: 20px;
            border-radius: 4px;
            max-width: 400px;
            width: 80%;
        }
        .modal h3 {
            margin-top: 0;
        }
        .modal label {
            display: block;
            margin: 10px 0 5px;
        }
        .modal input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .modal-buttons {
            text-align: right;
        }
        .modal-buttons button {
            margin-left: 10px;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .close-btn {
            background-color: #ccc;
        }
        .save-btn {
            background-color: #4CAF50;
            color: #fff;
        }
        .delete-btn {
            background-color: #f44336;
            color: #fff;
        }
    </style>
</head>
<body>

<h1>Missionary Meal Calendar</h1>
<p style="text-align:center;">
    Scan the QR code or visit <strong>YOUR_DOMAIN</strong> to sign up!
</p>

<div class="qr-code">
    <!-- Replace `YOUR_DOMAIN` with your real URL (https://example.com) -->
    <img
            src="https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=https://YOUR_DOMAIN"
            alt="Scan to Sign Up"
    />
</div>

<div class="calendar-container" id="calendarContainer"></div>

<!-- Modal for sign-up form -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalDateTitle">Sign Up for <span id="modalDate"></span></h3>
        <label for="nameInput">Your Name</label>
        <input type="text" id="nameInput" placeholder="Enter your name" />

        <label for="phoneInput">Phone Number</label>
        <input type="text" id="phoneInput" placeholder="(555) 555-5555" />

        <div class="modal-buttons">
            <button class="delete-btn" id="deleteBtn">Clear</button>
            <button class="close-btn" id="closeBtn">Cancel</button>
            <button class="save-btn" id="saveBtn">Save</button>
        </div>
    </div>
</div>

<script>
    // We'll fetch sign-ups from the server, store them here in an object:
    // signups = { "2025-3-15": { name: "John", phone: "555-5555" } }
    let signups = {};

    // Utility functions
    function getFirstDayOfMonth(year, month) {
        return new Date(year, month, 1).getDay(); // 0=Sunday,1=Mon,2=Tue...
    }
    function getDaysInMonth(year, month) {
        return new Date(year, month + 1, 0).getDate();
    }

    // Build a calendar table for a specific month/year
    function buildCalendar(year, month) {
        const monthName = new Date(year, month, 1).toLocaleString('default', { month: 'long' });
        const daysInMonth = getDaysInMonth(year, month);
        const firstDay = getFirstDayOfMonth(year, month); // Sunday=0

        let table = document.createElement('table');

        // Table Header (days of week)
        let thead = document.createElement('thead');
        let headerRow = document.createElement('tr');
        let weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        weekdays.forEach(day => {
            let th = document.createElement('th');
            th.textContent = day;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        // Table Body
        let tbody = document.createElement('tbody');
        let currentDay = 1;
        let row = document.createElement('tr');

        // Fill blank cells before first day
        for (let i = 0; i < firstDay; i++) {
            let emptyCell = document.createElement('td');
            row.appendChild(emptyCell);
        }

        // Fill the rest of the days
        for (; currentDay <= daysInMonth; currentDay++) {
            if (row.children.length === 7) {
                tbody.appendChild(row);
                row = document.createElement('tr');
            }
            let dayCell = document.createElement('td');
            const dateKey = `${year}-${month+1}-${currentDay}`;
            dayCell.setAttribute('data-date', dateKey);
            dayCell.textContent = currentDay;

            // If there's sign-up info from the server, display it
            if (signups[dateKey]) {
                let infoSpan = document.createElement('span');
                infoSpan.classList.add('sign-up-info');
                infoSpan.textContent = signups[dateKey].name + ' (' + signups[dateKey].phone + ')';
                dayCell.appendChild(infoSpan);
            }

            // Click to open modal
            dayCell.addEventListener('click', handleCellClick);
            row.appendChild(dayCell);
        }

        // Fill remaining cells if row isn't complete
        while (row.children.length < 7) {
            let emptyCell = document.createElement('td');
            row.appendChild(emptyCell);
        }

        tbody.appendChild(row);
        table.appendChild(tbody);

        // Wrap table in a .month div
        let monthDiv = document.createElement('div');
        monthDiv.classList.add('month');

        let monthTitle = document.createElement('div');
        monthTitle.classList.add('month-title');
        monthTitle.textContent = `${monthName} ${year}`;
        monthDiv.appendChild(monthTitle);
        monthDiv.appendChild(table);

        return monthDiv;
    }

    let selectedDateKey = null;
    function handleCellClick(e) {
        selectedDateKey = e.currentTarget.getAttribute('data-date');
        if (!selectedDateKey) return;

        document.getElementById('modalDate').textContent = selectedDateKey;

        // Prefill existing data if present
        const existing = signups[selectedDateKey];
        document.getElementById('nameInput').value = existing ? existing.name : '';
        document.getElementById('phoneInput').value = existing ? existing.phone : '';

        // Show modal
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    // Modal buttons
    document.getElementById('closeBtn').addEventListener('click', () => {
        document.getElementById('modalOverlay').style.display = 'none';
    });
    document.getElementById('saveBtn').addEventListener('click', saveSignup);
    document.getElementById('deleteBtn').addEventListener('click', clearSignup);

    function saveSignup() {
        if (!selectedDateKey) return;
        const nameValue = document.getElementById('nameInput').value.trim();
        const phoneValue = document.getElementById('phoneInput').value.trim();

        // POST to /api/signups
        fetch('/api/signups', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dateKey: selectedDateKey, name: nameValue, phone: phoneValue })
        })
            .then(res => res.json())
            .then(data => {
                // Hide modal
                document.getElementById('modalOverlay').style.display = 'none';
                // Refresh the signups
                fetchSignups();
            })
            .catch(err => console.error(err));
    }

    function clearSignup() {
        if (!selectedDateKey) return;

        if (!confirm(`Clear sign-up info for ${selectedDateKey}?`)) return;

        // POST with empty name/phone
        fetch('/api/signups', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dateKey: selectedDateKey, name: '', phone: '' })
        })
            .then(res => res.json())
            .then(data => {
                // Hide modal
                document.getElementById('modalOverlay').style.display = 'none';
                // Refresh
                fetchSignups();
            })
            .catch(err => console.error(err));
    }

    // Fetch sign-ups from server
    function fetchSignups() {
        fetch('/api/signups')
            .then(res => res.json())
            .then(data => {
                signups = data;
                refreshCalendar();
            })
            .catch(err => console.error(err));
    }

    function refreshCalendar() {
        const container = document.getElementById('calendarContainer');
        container.innerHTML = '';

        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth();

        // Current month
        const currentMonthCalendar = buildCalendar(currentYear, currentMonth);
        container.appendChild(currentMonthCalendar);

        // Next month
        let nextMonth = currentMonth + 1;
        let nextMonthYear = currentYear;
        if (nextMonth > 11) {
            nextMonth = 0;
            nextMonthYear++;
        }
        const nextMonthCalendar = buildCalendar(nextMonthYear, nextMonth);
        container.appendChild(nextMonthCalendar);
    }

    // Init
    window.addEventListener('DOMContentLoaded', () => {
        fetchSignups();
    });
</script>
</body>
</html>
