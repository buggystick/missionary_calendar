<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <!-- Ensure mobile-friendly scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Missionary Meal Calendar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            padding: 1em;
        }

        /* Example Banner (previously “unused”) */
        .information-banner {
            background: #fffbcc;
            border: 1px solid #e2dfb2;
            padding: 1em;
            margin-bottom: 1em;
            text-align: center;
            font-weight: bold;
        }

        h1 {
            text-align: center;
            margin: 0.5em 0;
        }

        .qr-code {
            text-align: center;
            margin: 1em 0;
        }

        .month-nav {
            text-align: center;
            margin: 1em 0;
        }

        .month-nav button {
            padding: 0.5em 1em;
            margin: 0 1em;
            cursor: pointer;
            border: none;
            background: #4CAF50;
            color: #fff;
            border-radius: 4px;
            font-size: 1rem;
        }
        .month-nav button.secondary {
            background: #999;
            color: #fff;
        }

        /* Make the calendar container and month responsive */
        .calendar-container {
            display: flex;
            justify-content: center;
            margin: 0 auto;
            max-width: 900px;
            width: 100%;
        }

        .month {
            width: 100%;
            max-width: 600px; /* On large screens, don’t exceed 600px wide */
            border: 1px solid #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .month-title {
            background: #eee;
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            font-size: 1.2em;
        }

        /* Force table columns to be equal width */
        table {
            table-layout: fixed;
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            vertical-align: top;
            min-height: 80px;
            /* Ensure text can wrap instead of expanding the column */
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: anywhere;
            /* Each of the 7 columns shares width equally; optional if table-layout:fixed is enough */
            width: calc(100% / 7);
        }

        th {
            background: #f9f9f9;
        }

        /* Hover effect on future days */
        td:hover:not(.past-day) {
            background: #f0f8ff;
            cursor: pointer;
        }

        /* Past day (disabled) */
        .past-day {
            background: #eee;
            color: #999;
            cursor: not-allowed !important;
        }

        .highlight-day {
            background-color: #ffc;
        }

        /* Name & phone info clearly visible */
        .sign-up-info {
            display: block;
            font-size: 0.95em;
            color: #333;
            margin-top: 4px;
            word-wrap: break-word;  /* Wrap phone if it's long */
        }

        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        /* Modal box */
        .modal {
            background: #fff;
            padding: 20px;
            border-radius: 4px;
            max-width: 400px;
            width: 80%;
        }

        /* Wrap content in an additional .modal-content class */
        .modal-content {
            background: #fafafa;
            padding: 1em;
            border-radius: 4px;
        }

        .modal h3 {
            margin-top: 0;
        }

        .modal label {
            display: block;
            margin: 10px 0 5px;
        }

        .modal input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .modal-buttons {
            text-align: right;
        }

        .modal-buttons button {
            margin-left: 10px;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .close-btn {
            background-color: #ccc;
        }
        .save-btn {
            background-color: #4CAF50;
            color: #fff;
        }
        .delete-btn {
            background-color: #f44336;
            color: #fff;
        }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 600px) {
            th, td {
                padding: 6px;
                min-height: 60px; /* Slightly smaller on mobile */
            }
            .month-title {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>

<!-- Example of a banner using the .information-banner class -->
<!--<div class="information-banner">-->
<!--    Important Note: You can sign up to feed the missionaries on any future date. Past dates are not available.-->
<!--</div>-->

<h1>Missionary Meal Calendar</h1>
<p style="text-align:center;">
    Scan the QR code or visit <strong>YOUR_DOMAIN</strong> to sign up!
</p>

<!-- Replace YOUR_DOMAIN below with your actual deployed URL -->
<div class="qr-code">
    <img
            src="https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=https://YOUR_DOMAIN"
            alt="Scan to Sign Up"
    />
</div>

<div class="month-nav">
    <!-- Default show the current month; toggle to next month with this button -->
    <button id="nextMonthBtn">Next Month »</button>
</div>

<div class="calendar-container" id="calendarContainer"></div>

<!-- Modal for sign-up form -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-content">
            <h3 id="modalDateTitle">
                Sign Up for <span id="modalDate"></span>
            </h3>
            <label for="nameInput">Your Name</label>
            <input type="text" id="nameInput" placeholder="Enter your name" />

            <label for="phoneInput">Phone Number</label>
            <input type="text" id="phoneInput" placeholder="(555) 555-5555" />

            <div class="modal-buttons">
                <button class="delete-btn" id="deleteBtn">Clear</button>
                <button class="close-btn" id="closeBtn">Cancel</button>
                <button class="save-btn" id="saveBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    // signups = { "YYYY-M-D": { name, phone }, ... }
    let signups = {};

    // Track which month is displayed
    let displayedYear;
    let displayedMonth;

    window.addEventListener('DOMContentLoaded', () => {
        const today = new Date();
        displayedYear = today.getFullYear();
        displayedMonth = today.getMonth();

        fetchSignups().then(() => {
            refreshCalendar();
        });

        // NEXT MONTH button toggles current vs. next month
        document.getElementById('nextMonthBtn').addEventListener('click', () => {
            const currentDate = new Date();
            const currentMonthIndex = currentDate.getMonth();
            const currentYearIndex = currentDate.getFullYear();

            // If currently showing today's month, go next
            if (displayedYear === currentYearIndex && displayedMonth === currentMonthIndex) {
                displayedMonth++;
                if (displayedMonth > 11) {
                    displayedMonth = 0;
                    displayedYear++;
                }
                document.getElementById('nextMonthBtn').textContent = '« Current Month';
            } else {
                // Otherwise, go back to current month
                displayedYear = currentYearIndex;
                displayedMonth = currentMonthIndex;
                document.getElementById('nextMonthBtn').textContent = 'Next Month »';
            }
            refreshCalendar();
        });
    });

    // Fetch signups from server
    function fetchSignups() {
        return fetch('/api/signups')
            .then(res => res.json())
            .then(data => {
                signups = data;
            })
            .catch(err => console.error(err));
    }

    // Build or rebuild the calendar
    function refreshCalendar() {
        const container = document.getElementById('calendarContainer');
        container.innerHTML = ''; // Clear existing

        const monthDiv = buildCalendar(displayedYear, displayedMonth);
        container.appendChild(monthDiv);
    }

    function buildCalendar(year, month) {
        const monthName = new Date(year, month, 1).toLocaleString('default', { month: 'long' });
        const daysInMonth = getDaysInMonth(year, month);
        const firstDay = getFirstDayOfMonth(year, month);

        // Table for this month
        const table = document.createElement('table');

        // Header row with days of week
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        weekdays.forEach(day => {
            const th = document.createElement('th');
            th.textContent = day;
            headerRow.appendChild(th);
        });
        thead.appendChild(headerRow);
        table.appendChild(thead);

        // Table body with day cells
        const tbody = document.createElement('tbody');
        let currentDay = 1;
        let row = document.createElement('tr');

        // Fill empty cells before first day
        for (let i = 0; i < firstDay; i++) {
            let emptyCell = document.createElement('td');
            row.appendChild(emptyCell);
        }

        // For disabling past dates
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // Populate days
        for (; currentDay <= daysInMonth; currentDay++) {
            if (row.children.length === 7) {
                tbody.appendChild(row);
                row = document.createElement('tr');
            }

            const dayCell = document.createElement('td');
            const dateKey = `${year}-${month + 1}-${currentDay}`;
            dayCell.textContent = currentDay;

            // Figure out if this day is Sunday (highlight example)
            const cellDate = new Date(year, month, currentDay);
            const dayOfWeek = cellDate.getDay(); // 0=Sunday, 1=Monday, etc.

            // We highlight Sundays to use .highlight-day
            // if (dayOfWeek === 0) {
            //     dayCell.classList.add('highlight-day');
            // }

            // Grey out if in the past
            cellDate.setHours(0, 0, 0, 0);
            if (cellDate < today) {
                dayCell.classList.add('past-day');
            } else {
                // Future or current day: clickable
                dayCell.setAttribute('data-date', dateKey);
                // Properly use the event parameter (e) to avoid “unused parameter” warnings
                dayCell.addEventListener('click', (e) => handleCellClick(e));
            }

            // If there's signup info, show it
            if (signups[dateKey]) {
                const infoSpan = document.createElement('span');
                infoSpan.classList.add('sign-up-info');
                infoSpan.textContent = `${signups[dateKey].name} (${signups[dateKey].phone})`;
                dayCell.appendChild(infoSpan);
            }

            row.appendChild(dayCell);
        }

        // Fill remaining cells in last row
        while (row.children.length < 7) {
            let emptyCell = document.createElement('td');
            row.appendChild(emptyCell);
        }
        tbody.appendChild(row);
        table.appendChild(tbody);

        // Wrap table in a .month div
        const monthDiv = document.createElement('div');
        monthDiv.classList.add('month');

        const monthTitle = document.createElement('div');
        monthTitle.classList.add('month-title');
        monthTitle.textContent = `${monthName} ${year}`;
        monthDiv.appendChild(monthTitle);
        monthDiv.appendChild(table);

        return monthDiv;
    }

    // Helpers
    function getFirstDayOfMonth(year, month) {
        return new Date(year, month, 1).getDay();
    }
    function getDaysInMonth(year, month) {
        return new Date(year, month + 1, 0).getDate();
    }

    // Modal logic
    let selectedDateKey = null;
    function handleCellClick(e) {
        // e is used to fetch data attributes or prevent default if needed
        selectedDateKey = e.currentTarget.getAttribute('data-date');
        if (!selectedDateKey) return;

        document.getElementById('modalDate').textContent = selectedDateKey;

        // Pre-fill if existing
        const existing = signups[selectedDateKey];
        document.getElementById('nameInput').value = existing ? existing.name : '';
        document.getElementById('phoneInput').value = existing ? existing.phone : '';

        // Show modal
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    document.getElementById('closeBtn').addEventListener('click', () => {
        document.getElementById('modalOverlay').style.display = 'none';
    });

    document.getElementById('saveBtn').addEventListener('click', saveSignup);
    document.getElementById('deleteBtn').addEventListener('click', clearSignup);

    function saveSignup() {
        if (!selectedDateKey) return;
        const nameValue = document.getElementById('nameInput').value.trim();
        const phoneValue = document.getElementById('phoneInput').value.trim();

        fetch('/api/signups', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dateKey: selectedDateKey, name: nameValue, phone: phoneValue })
        })
            .then(res => res.json())
            .then(data => {
                // Hide modal
                document.getElementById('modalOverlay').style.display = 'none';
                // Refresh signups and rebuild
                return fetchSignups();
            })
            .then(() => {
                refreshCalendar();
            })
            .catch(err => console.error(err));
    }

    function clearSignup() {
        if (!selectedDateKey) return;
        if (!confirm(`Clear sign-up info for ${selectedDateKey}?`)) return;

        fetch('/api/signups', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dateKey: selectedDateKey, name: '', phone: '' })
        })
            .then(res => res.json())
            .then(data => {
                // Hide modal
                document.getElementById('modalOverlay').style.display = 'none';
                // Refresh
                return fetchSignups();
            })
            .then(() => {
                refreshCalendar();
            })
            .catch(err => console.error(err));
    }
</script>
</body>
</html>
